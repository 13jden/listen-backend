name: Build Feature Branch
run-name: ${{ github.actor }} - ${{ github.event.head_commit.message }} 🚀
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'
          cache: 'maven'

      - name: Clean Maven cache
        run: rm -rf ~/.m2/repository/com/listen && rm -rf ~/.m2/repository/com/example/common

      - name: Build with Maven
        run: mvn clean install -pl listen-admin -am -DskipTests -U

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-aer4k3m8uw2sue3f.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            crpi-aer4k3m8uw2sue3f.cn-hangzhou.personal.cr.aliyuncs.com/dzkdzk/listen-backend:latest
            crpi-aer4k3m8uw2sue3f.cn-hangzhou.personal.cr.aliyuncs.com/dzkdzk/listen-backend:${{ github.sha }}
          build-args: |
            GIT_COMMIT_ID=${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 10m
          script: |
            # 创建部署目录
            mkdir -p /opt/listen-bankend

            # 创建文件上传目录
            mkdir -p /usr/local/listen/audio
            mkdir -p /usr/local/listen/temp
            mkdir -p /usr/local/listen/userFile

            # 配置 SSH 密钥
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa

            # 配置 SSH 主机密钥验证
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            # 启动 SSH agent 并添加密钥
            eval "$(ssh-agent -s)"
            ssh-add ~/.ssh/id_rsa

            # 克隆或更新代码仓库 - 使用SSH
            if [ -d "/opt/listen-bankend/.git" ]; then
              cd /opt/listen-bankend
              git pull origin master
            else
              git clone git@github.com:13jden/listen-backend.git /opt/listen-bankend
              cd /opt/listen-bankend
            fi

            # 登录阿里云容器镜像服务
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login --username="${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin crpi-aer4k3m8uw2sue3f.cn-hangzhou.personal.cr.aliyuncs.com

            # 删除旧镜像并强制拉取最新镜像
            echo "删除旧镜像..."
            docker rmi crpi-aer4k3m8uw2sue3f.cn-hangzhou.personal.cr.aliyuncs.com/dzkdzk/listen-backend:latest 2>/dev/null || true
            echo "拉取最新镜像..."
            docker pull crpi-aer4k3m8uw2sue3f.cn-hangzhou.personal.cr.aliyuncs.com/dzkdzk/listen-backend:latest

            # 升级 docker-compose 到最新版本（解决版本过旧问题）
            # 由于下载慢，暂时注释，每次部署都升级没必要
            # echo "检查并升级 docker-compose..."
            # COMPOSE_URL="https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)"
            # if sudo curl -L --max-time 120 "$COMPOSE_URL" -o /usr/local/bin/docker-compose; then
            #   sudo chmod +x /usr/local/bin/docker-compose
            #   echo "docker-compose 升级成功: $(docker-compose --version 2>/dev/null || echo '版本未知')"
            # else
            #   echo "docker-compose 升级失败，将尝试使用 docker compose V2"
            # fi

            # 停止旧容器并启动新容器
            cd /opt/listen-bankend

            # 创建必要的目录
            mkdir -p /opt/listen-bankend/logs
            mkdir -p /opt/listen-bankend/config

            # 优先使用 docker compose V2，如果不可用则使用升级后的 docker-compose
            if docker compose version &> /dev/null; then
              echo "使用 docker compose V2"
              docker compose down || true
              docker compose up -d
            else
              echo "使用 docker-compose"
              docker-compose down || true
              docker-compose up -d
            fi

            # 等待容器启动
            sleep 5

            # 检查容器内文件目录是否存在
            docker exec listen-spring-app ls -la /opt/listen/files/audio || echo "警告: 容器内文件目录检查失败"

            # 清理旧镜像
            docker image prune -f
